apiVersion: v1
kind: Namespace
metadata:
  name: teste-infra
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-teste
  namespace: teste-infra
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-teste
  template:
    metadata:
      labels:
        app: app-teste
    spec:
      containers:
      - name: echoserver
        image: registry.k8s.io/e2e-test-images/agnhost:2.43
        args:
        - netexec
        - --http-port=8080
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: svc-teste
  namespace: teste-infra
spec:
  type: ClusterIP
  ipFamilyPolicy: PreferDualStack
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: app-teste
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-infra
  namespace: teste-infra
spec:
  gatewayClassName: cilium
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rota-teste
  namespace: teste-infra
spec:
  parentRefs:
  - name: gateway-infra
  hostnames:
  - "teste-infra.k8s.sj.ifsc.edu.br"
  rules:
  - backendRefs:
    - name: svc-teste
      port: 80
